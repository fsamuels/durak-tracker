<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024" width="1024" height="1024">
  <!-- Option I — "Fool & Fan": E's head front and center, the two cards peeking out behind -->
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#0e1a2b"/>
      <stop offset="1" stop-color="#060c14"/>
    </linearGradient>
    <radialGradient id="glow" cx="0.5" cy="0.43" r="0.6">
      <stop offset="0" stop-color="#274169" stop-opacity="0.6"/>
      <stop offset="1" stop-color="#274169" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="white" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#ffffff"/>
      <stop offset="1" stop-color="#e6eef6"/>
    </linearGradient>
    <linearGradient id="navy" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#1c2f4f"/>
      <stop offset="1" stop-color="#0b1626"/>
    </linearGradient>
    <linearGradient id="faceI" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#fff8ee"/>
      <stop offset="1" stop-color="#f2ddc4"/>
    </linearGradient>
    <linearGradient id="hatRedI" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#e0473d"/>
      <stop offset="1" stop-color="#b02c26"/>
    </linearGradient>
    <linearGradient id="hatNavyI" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#33568c"/>
      <stop offset="1" stop-color="#1a3057"/>
    </linearGradient>
    <linearGradient id="gold" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#f7e29b"/>
      <stop offset="0.5" stop-color="#e6b64b"/>
      <stop offset="1" stop-color="#c1882c"/>
    </linearGradient>
    <radialGradient id="noseI" cx="0.35" cy="0.3" r="0.9">
      <stop offset="0" stop-color="#ff867b"/>
      <stop offset="1" stop-color="#c9302a"/>
    </radialGradient>
    <radialGradient id="hairI" cx="0.4" cy="0.35" r="0.9">
      <stop offset="0" stop-color="#ea5a4f"/>
      <stop offset="1" stop-color="#b8302a"/>
    </radialGradient>
    <path id="spadeShape" d="M0 -100 C 40 -60 100 -30 100 22 C 100 58 70 78 40 66 C 46 88 56 98 72 104 L -72 104 C -56 98 -46 88 -40 66 C -70 78 -100 58 -100 22 C -100 -30 -40 -60 0 -100 Z"/>

    <!-- E's fool, face centered at (512, 590) -->
    <g id="fool">
      <circle cx="272" cy="520" r="58" fill="url(#hairI)"/>
      <circle cx="752" cy="520" r="58" fill="url(#hairI)"/>
      <circle cx="512" cy="590" r="272" fill="url(#faceI)"/>
      <path d="M 322 392 C 292 334, 268 262, 286 202 C 362 262, 452 292, 512 338 L 512 392 Z" fill="url(#hatRedI)"/>
      <path d="M 702 392 C 732 334, 756 262, 738 202 C 662 262, 572 292, 512 338 L 512 392 Z" fill="url(#hatNavyI)"/>
      <circle cx="284" cy="196" r="32" fill="url(#gold)"/>
      <circle cx="740" cy="196" r="32" fill="url(#gold)"/>
      <rect x="300" y="382" width="424" height="62" rx="31" fill="url(#gold)"/>
      <circle cx="430" cy="556" r="27" fill="#1b2b45"/>
      <circle cx="594" cy="556" r="27" fill="#1b2b45"/>
      <circle cx="439" cy="547" r="9" fill="#ffffff"/>
      <circle cx="603" cy="547" r="9" fill="#ffffff"/>
      <ellipse cx="352" cy="652" rx="42" ry="30" fill="#ffab9e" opacity="0.55"/>
      <ellipse cx="672" cy="652" rx="42" ry="30" fill="#ffab9e" opacity="0.55"/>
      <path d="M 428 692 Q 512 766 596 692" fill="none" stroke="#c9362f" stroke-width="18" stroke-linecap="round"/>
      <circle cx="512" cy="628" r="48" fill="url(#noseI)"/>
      <ellipse cx="496" cy="612" rx="14" ry="10" fill="#ffffff" opacity="0.65"/>
    </g>
  </defs>

  <rect width="1024" height="1024" fill="url(#bg)"/>
  <rect width="1024" height="1024" fill="url(#glow)"/>

  <ellipse cx="512" cy="846" rx="270" ry="42" fill="#000000" opacity="0.35"/>

  <!-- cards fanned out behind the head -->
  <g transform="translate(360 425) rotate(-18)">
    <rect x="-127" y="-180" width="254" height="360" rx="22" fill="url(#navy)" stroke="#e6b64b" stroke-width="6"/>
    <rect x="-108" y="-161" width="216" height="322" rx="14" fill="none" stroke="#e6b64b" stroke-width="3" opacity="0.7"/>
    <path d="M 0 -46 l 46 50 -46 50 -46 -50 z" fill="#e6b64b" opacity="0.85"/>
  </g>
  <g transform="translate(664 425) rotate(14)">
    <rect x="-127" y="-180" width="254" height="360" rx="22" fill="url(#white)" stroke="#ccd7e2" stroke-width="3"/>
    <use href="#spadeShape" transform="translate(78 -128) scale(0.22)" fill="#16233a"/>
  </g>

  <!-- the fool in front -->
  <use href="#fool" transform="translate(512 600) scale(0.85) translate(-512 -590)"/>
</svg>
