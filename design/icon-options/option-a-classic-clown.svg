<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024" width="1024" height="1024">
  <!-- Option A — "Classic Clown": friendly emoji-style clown face, side hair tufts, big warm eyes -->
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#0e1a2b"/>
      <stop offset="1" stop-color="#060c14"/>
    </linearGradient>
    <radialGradient id="glow" cx="0.5" cy="0.43" r="0.6">
      <stop offset="0" stop-color="#274169" stop-opacity="0.6"/>
      <stop offset="1" stop-color="#274169" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="face" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#fff8ee"/>
      <stop offset="1" stop-color="#f2ddc4"/>
    </linearGradient>
    <radialGradient id="noseA" cx="0.35" cy="0.3" r="0.9">
      <stop offset="0" stop-color="#ff867b"/>
      <stop offset="1" stop-color="#c9302a"/>
    </radialGradient>
    <radialGradient id="hair" cx="0.4" cy="0.35" r="0.9">
      <stop offset="0" stop-color="#ea5a4f"/>
      <stop offset="1" stop-color="#b8302a"/>
    </radialGradient>
  </defs>

  <rect width="1024" height="1024" fill="url(#bg)"/>
  <rect width="1024" height="1024" fill="url(#glow)"/>

  <!-- hair tufts (behind face) -->
  <g fill="url(#hair)">
    <circle cx="252" cy="428" r="86"/>
    <circle cx="214" cy="540" r="76"/>
    <circle cx="252" cy="648" r="70"/>
    <circle cx="772" cy="428" r="86"/>
    <circle cx="810" cy="540" r="76"/>
    <circle cx="772" cy="648" r="70"/>
  </g>

  <!-- face -->
  <circle cx="512" cy="540" r="300" fill="url(#face)"/>

  <!-- greasepaint eye patches -->
  <ellipse cx="420" cy="478" rx="62" ry="80" fill="#ffffff" opacity="0.92"/>
  <ellipse cx="604" cy="478" rx="62" ry="80" fill="#ffffff" opacity="0.92"/>

  <!-- eyes -->
  <circle cx="420" cy="490" r="34" fill="#1b2b45"/>
  <circle cx="604" cy="490" r="34" fill="#1b2b45"/>
  <circle cx="432" cy="478" r="11" fill="#ffffff"/>
  <circle cx="616" cy="478" r="11" fill="#ffffff"/>

  <!-- cheeks -->
  <ellipse cx="330" cy="602" rx="48" ry="34" fill="#ffab9e" opacity="0.55"/>
  <ellipse cx="694" cy="602" rx="48" ry="34" fill="#ffab9e" opacity="0.55"/>

  <!-- mouth: white greasepaint smile with red lip line -->
  <path d="M 372 630 C 420 742, 604 742, 652 630 C 600 702, 424 702, 372 630 Z" fill="#ffffff" opacity="0.95"/>
  <path d="M 372 630 C 420 742, 604 742, 652 630" fill="none" stroke="#c9362f" stroke-width="22" stroke-linecap="round"/>

  <!-- nose -->
  <circle cx="512" cy="572" r="66" fill="url(#noseA)"/>
  <ellipse cx="490" cy="550" rx="20" ry="14" fill="#ffffff" opacity="0.65"/>
</svg>
